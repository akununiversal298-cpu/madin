<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bank Soal & Jawaban</title>
    <style>
        /* ===== ROOT ===== */
        :root {
            --bg-color: #e0e8f3;
            --text-color: #3d4f66;
            --shadow-light: #ffffff;
            --shadow-dark: #b8c4d6;
            --accent-color: #4a69bd;
            --answer-text-color: #2c3e50;
            --tab-active-bg: #d5dfec;
            --tab-text: #3d4f66;
            --tab-active-text: #4a69bd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            -webkit-overflow-scrolling: touch;
            touch-action: manipulation;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 15px 15px 85px 15px;
            direction: ltr;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        /* ===== JUDUL ===== */
        .app-header {
            text-align: center;
            padding: 18px 10px 14px 10px;
            margin-bottom: 20px;
            font-size: 20pt;
            font-weight: 700;
            color: var(--text-color);
            background: var(--bg-color);
            border-radius: 20px;
            box-shadow: 6px 6px 14px var(--shadow-dark),
                -6px -6px 14px var(--shadow-light);
            letter-spacing: 0.5px;
        }
        .app-header small {
            display: block;
            font-size: 12pt;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ===== TAB BAR ===== */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 22px;
            overflow-x: auto;
            padding: 6px 4px 10px 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            flex: 1 0 auto;
            min-width: 58px;
            padding: 10px 8px;
            font-size: 13pt;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 14px;
            background: var(--bg-color);
            color: var(--tab-text);
            box-shadow: 4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
            cursor: pointer;
            touch-action: manipulation;
            text-align: center;
            transition: all 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
            white-space: nowrap;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
        }

        .tab-btn:active {
            transform: scale(0.96);
        }

        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--tab-active-text);
            box-shadow: inset 3px 3px 8px var(--shadow-dark),
                inset -3px -3px 8px var(--shadow-light);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 30%;
            right: 30%;
            height: 3px;
            border-radius: 4px;
            background: var(--accent-color);
        }

        /* Indikator double‑click untuk ganti nama */
        .tab-btn .edit-hint {
            font-size: 8pt;
            opacity: 0.5;
            margin-right: 4px;
            font-weight: 400;
        }

        /* ===== CARD SOAL ===== */
        .question-item {
            background: var(--bg-color);
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 7px 7px 15px var(--shadow-dark),
                -7px -7px 15px var(--shadow-light);
            position: relative;
        }

        .question-text {
            font-size: 16pt;
            line-height: 1.8;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding-left: 55px;
        }

        .num {
            color: var(--accent-color);
            font-weight: 700;
            min-width: 25px;
        }

        .text-soal {
            flex: 1;
            outline: none;
            padding: 8px 10px;
            border-radius: 8px;
            min-height: 45px;
            word-break: break-word;
            -webkit-user-select: text;
            user-select: text;
            touch-action: manipulation;
            font-size: 16pt;
        }

        .text-soal:empty:before {
            content: attr(data-placeholder);
            color: #999;
            opacity: 0.7;
        }

        .text-soal:focus {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* ===== TOGGLE RTL (per soal/jawaban) ===== */
        .rtl-controls {
            display: flex;
            gap: 8px;
            margin: 8px 0 0 55px;
        }

        .rtl-toggle-btn {
            font-size: 9.5pt;
            font-weight: 600;
            font-family: inherit;
            padding: 5px 10px;
            border: none;
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--tab-text);
            box-shadow: 2px 2px 5px var(--shadow-dark),
                -2px -2px 5px var(--shadow-light);
            cursor: pointer;
            touch-action: manipulation;
            min-height: 30px;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }

        .rtl-toggle-btn.active {
            background: var(--tab-active-bg);
            color: var(--tab-active-text);
            box-shadow: inset 2px 2px 4px var(--shadow-dark),
                inset -2px -2px 4px var(--shadow-light);
        }

        .rtl-toggle-btn:active {
            transform: scale(0.96);
        }

        .text-soal.rtl-mode {
            direction: rtl;
            text-align: right;
            font-family: 'Traditional Arabic', 'Noto Naskh Arabic', 'Scheherazade New', Tahoma, Arial, sans-serif;
        }

        .text-jawaban.rtl-mode {
            direction: rtl;
            text-align: right;
            font-family: 'Traditional Arabic', 'Noto Naskh Arabic', 'Scheherazade New', Tahoma, Arial, sans-serif;
        }

        /* ===== STATUS SINKRONISASI ===== */
        #syncStatus {
            display: block;
            font-size: 9pt;
            margin-top: 2px;
            opacity: 0.75;
        }

        .answer-container {
            margin-top: 15px;
        }

        .text-jawaban {
            width: 100%;
            min-height: 60px;
            background: var(--bg-color);
            border: none;
            outline: none;
            border-radius: 12px;
            padding: 14px;
            font-family: inherit;
            font-size: 15pt;
            color: var(--answer-text-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark),
                inset -4px -4px 8px var(--shadow-light);
            resize: vertical;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-appearance: none;
            line-height: 1.7;
        }

        .text-jawaban:focus {
            box-shadow: inset 5px 5px 10px var(--shadow-dark),
                inset -5px -5px 10px var(--shadow-light),
                0 0 0 3px rgba(74, 105, 189, 0.2);
        }

        .text-jawaban::placeholder {
            color: #aaa;
            opacity: 0.6;
        }

        /* ===== TOMBOL HAPUS ===== */
        .btn-remove {
            position: absolute;
            left: 12px;
            top: 12px;
            background: var(--bg-color);
            color: #e74c3c;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11pt;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark),
                -3px -3px 6px var(--shadow-light);
            touch-action: manipulation;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-remove:active {
            box-shadow: inset 2px 2px 4px var(--shadow-dark),
                inset -2px -2px 4px var(--shadow-light);
            transform: scale(0.95);
        }

        /* ===== MENU BAWAH ===== */
        .action-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(224, 232, 243, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
            box-shadow: 0 -5px 15px rgba(184, 196, 214, 0.4);
            display: flex;
            gap: 12px;
            z-index: 1000;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 12pt;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-color);
            box-shadow: 4px 4px 10px var(--shadow-dark),
                -4px -4px 10px var(--shadow-light);
            text-align: center;
            touch-action: manipulation;
            min-height: 48px;
            -webkit-user-select: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-add {
            color: #2f3542;
        }
        .btn-print {
            color: var(--accent-color);
        }

        .btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark),
                inset -3px -3px 6px var(--shadow-light);
            transform: scale(0.97);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .tab-btn {
                font-size: 11pt;
                padding: 8px 6px;
                min-width: 48px;
                min-height: 42px;
            }
            .app-header {
                font-size: 17pt;
                padding: 14px 8px 10px 8px;
            }
            .app-header small {
                font-size: 10pt;
            }
            .tab-btn .edit-hint {
                display: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px 10px 80px 10px;
            }
            .question-item {
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 14px;
            }
            .question-text {
                font-size: 15pt;
                padding-left: 50px;
            }
            .rtl-controls {
                margin-left: 50px;
            }
            .text-soal {
                padding: 6px 8px;
                min-height: 40px;
                font-size: 15pt;
            }
            .text-jawaban {
                font-size: 14pt;
                padding: 12px;
            }
            .btn-remove {
                left: 8px;
                top: 8px;
                padding: 6px 10px;
                font-size: 10pt;
                min-width: 38px;
                min-height: 38px;
            }
            .btn {
                font-size: 11pt;
                padding: 12px;
            }
            .action-menu {
                padding: 12px 10px;
                gap: 10px;
            }
            .tab-btn {
                font-size: 10pt;
                padding: 6px 5px;
                min-width: 40px;
                min-height: 36px;
                border-radius: 10px;
            }
            .tab-bar {
                gap: 5px;
                padding: 4px 2px 8px 2px;
            }
        }

        /* ===== CETAK ===== */
        @media print {
            body {
                background-color: #fff !important;
                padding: 0;
                font-family: 'Times New Roman', Times, serif;
                color: #000;
                direction: ltr;
            }
            .question-item {
                background: transparent !important;
                box-shadow: none !important;
                padding: 10px 0 !important;
                margin-bottom: 20px;
                page-break-inside: avoid;
                border-bottom: 1px dashed #ccc;
            }
            .question-text {
                padding-left: 0;
                font-size: 14pt;
            }
            .num {
                color: #000;
            }
            .text-jawaban {
                box-shadow: none !important;
                background: transparent !important;
                border: 1px solid #000 !important;
                margin-top: 10px;
                height: 80px;
            }
            .action-menu,
            .btn-remove,
            .tab-bar,
            .app-header,
            .rtl-controls {
                display: none !important;
            }
            .text-soal.rtl-mode,
            .text-jawaban.rtl-mode {
                direction: rtl;
                text-align: right;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <div class="app-header">
            📚 Bank Soal & Jawaban
            <small>Klik ganda pada tab untuk mengubah nama mata pelajaran</small>
            <small id="syncStatus">Menghubungkan ke Supabase...</small>
        </div>

        <!-- TAB BAR -->
        <div class="tab-bar" id="tabBar">
            <button class="tab-btn" data-subject="math">📐 Matematika</button>
            <button class="tab-btn" data-subject="science">🔬 IPA</button>
            <button class="tab-btn" data-subject="arabic">📖 Bahasa Arab</button>
            <button class="tab-btn" data-subject="islamic">🕌 Agama</button>
            <button class="tab-btn" data-subject="social">🌍 IPS</button>
        </div>

        <!-- AREA SOAL -->
        <div id="quizSection">
            <!-- diisi oleh JavaScript -->
        </div>

    </div>

    <!-- MENU BAWAH -->
    <div class="action-menu">
        <button class="btn btn-add" onclick="tambahSoal()">➕ Tambah Soal</button>
        <button class="btn btn-print" onclick="window.print()">📄 Simpan sebagai PDF</button>
    </div>

    <script type="module">
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://evxvzmvgflomfakmnbvu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_PCXPTrQ041FsEheBIddp0A_F7_Ymo1V';
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================================
        //  KONFIGURASI
        // ============================================================
        const ACTIVE_TAB_KEY = 'soal_active_tab';
        const LABEL_STORAGE_KEY = 'tab_labels';
        const SUBJECTS = ['math', 'science', 'arabic', 'islamic', 'social'];

        const DEFAULT_LABELS = {
            math: '📐 Matematika',
            science: '🔬 IPA',
            arabic: '📖 Bahasa Arab',
            islamic: '🕌 Agama',
            social: '🌍 IPS'
        };

        let currentSubject = 'math';
        let saveTimeout = null;
        let isLoading = false;

        // ============================================================
        //  STATUS SINKRONISASI
        // ============================================================
        function setStatus(text) {
            const el = document.getElementById('syncStatus');
            if (el) el.textContent = text;
        }

        // ============================================================
        //  MANAJEMEN LABEL TAB (tetap lokal, hanya kosmetik)
        // ============================================================
        function loadTabLabels() {
            try {
                const stored = localStorage.getItem(LABEL_STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    const merged = { ...DEFAULT_LABELS };
                    for (const key of SUBJECTS) {
                        if (parsed[key]) merged[key] = parsed[key];
                    }
                    return merged;
                }
            } catch (_) { /* ignore */ }
            return { ...DEFAULT_LABELS };
        }

        function saveTabLabels(labels) {
            localStorage.setItem(LABEL_STORAGE_KEY, JSON.stringify(labels));
        }

        function updateTabDisplay() {
            const labels = loadTabLabels();
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const subject = btn.dataset.subject;
                if (labels[subject]) {
                    btn.innerText = labels[subject];
                }
                if (!btn.querySelector('.edit-hint')) {
                    const hint = document.createElement('span');
                    hint.className = 'edit-hint';
                    hint.textContent = '✎';
                    btn.appendChild(hint);
                }
            });
        }

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            updateTabDisplay();

            const savedTab = localStorage.getItem(ACTIVE_TAB_KEY);
            currentSubject = (savedTab && SUBJECTS.includes(savedTab)) ? savedTab : 'math';

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.subject === currentSubject);
            });

            await muatSubject(currentSubject);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    const subject = this.dataset.subject;
                    if (subject === currentSubject || isLoading) return;

                    // pastikan perubahan terakhir tersimpan sebelum pindah tab
                    await flushSaveNow();

                    currentSubject = subject;
                    localStorage.setItem(ACTIVE_TAB_KEY, currentSubject);
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.subject === currentSubject);
                    });
                    await muatSubject(currentSubject);
                });

                btn.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    const subject = this.dataset.subject;
                    const labels = loadTabLabels();
                    const currentLabel = labels[subject] || DEFAULT_LABELS[subject] || subject;
                    const newLabel = prompt('Ubah nama mata pelajaran:', currentLabel);
                    if (newLabel !== null && newLabel.trim() !== '') {
                        labels[subject] = newLabel.trim();
                        saveTabLabels(labels);
                        updateTabDisplay();
                        document.querySelectorAll('.tab-btn').forEach(b => {
                            b.classList.toggle('active', b.dataset.subject === currentSubject);
                        });
                    }
                });
            });
        });

        // ============================================================
        //  MUAT DATA DARI SUPABASE
        // ============================================================
        async function muatSubject(subject) {
            isLoading = true;
            const quizSection = document.getElementById('quizSection');
            quizSection.innerHTML = '<p style="text-align:center;opacity:0.6;padding:20px;">Memuat soal...</p>';
            setStatus('Memuat data...');

            try {
                const { data, error } = await supabaseClient
                    .from('soal')
                    .select('*')
                    .eq('subject', subject)
                    .order('urutan', { ascending: true });

                if (error) throw error;

                quizSection.innerHTML = '';

                if (!data || data.length === 0) {
                    buatElemenSoal({
                        id: crypto.randomUUID(),
                        soal: '', jawaban: '',
                        soal_rtl: false, jawaban_rtl: false
                    });
                } else {
                    data.forEach(row => buatElemenSoal(row));
                }

                aturNomor();
                sesuaikanSemuaTinggi();
                setStatus('Tersambung ke Supabase ✅');
            } catch (err) {
                console.error(err);
                quizSection.innerHTML = '<p style="text-align:center;color:#e74c3c;padding:20px;">⚠️ Gagal memuat data. Cek koneksi internet & konfigurasi Supabase.</p>';
                setStatus('⚠️ Gagal terhubung ke Supabase');
            } finally {
                isLoading = false;
            }
        }

        // ============================================================
        //  SIMPAN KE SUPABASE (upsert semua baris subject aktif)
        // ============================================================
        async function simpanSubjectSekarang() {
            const semuaItem = document.querySelectorAll('#quizSection .question-item');
            const rows = [];
            semuaItem.forEach((item, index) => {
                const soalEl = item.querySelector('.text-soal');
                const jawabanEl = item.querySelector('.text-jawaban');
                rows.push({
                    id: item.dataset.id,
                    subject: currentSubject,
                    soal: soalEl?.innerText ?? '',
                    jawaban: jawabanEl?.value ?? '',
                    soal_rtl: soalEl?.classList.contains('rtl-mode') ?? false,
                    jawaban_rtl: jawabanEl?.classList.contains('rtl-mode') ?? false,
                    urutan: index,
                    updated_at: new Date().toISOString()
                });
            });

            if (rows.length === 0) return;

            setStatus('Menyimpan...');
            try {
                const { error } = await supabaseClient
                    .from('soal')
                    .upsert(rows, { onConflict: 'id' });
                if (error) throw error;
                setStatus('Tersimpan ✅');
            } catch (err) {
                console.error(err);
                setStatus('⚠️ Gagal menyimpan ke Supabase');
            }
        }

        async function flushSaveNow() {
            clearTimeout(saveTimeout);
            await simpanSubjectSekarang();
        }

        // ============================================================
        //  MANIPULASI DOM
        // ============================================================
        function buatElemenSoal(row) {
            const quizSection = document.getElementById('quizSection');
            const itemBaru = document.createElement('div');
            itemBaru.className = 'question-item';
            itemBaru.dataset.id = row.id || crypto.randomUUID();

            const soalClean = (row.soal ?? '').trim();
            const jawabanClean = (row.jawaban ?? '');
            const soalRtl = !!row.soal_rtl;
            const jawabanRtl = !!row.jawaban_rtl;

            itemBaru.innerHTML = `
                <button class="btn-remove" onclick="hapusSoal(this)">🗑 Hapus</button>
                <div class="question-text">
                    <span class="num"></span>
                    <span class="text-soal${soalRtl ? ' rtl-mode' : ''}" contenteditable="true" data-placeholder="Tulis pertanyaan..."
                          oninput="simpanOtomatis()"
                          onfocus="this.dataset.placeholder=''"
                          onblur="if(this.innerText.trim()==='') this.dataset.placeholder='Tulis pertanyaan...'">${soalClean}</span>
                </div>
                <div class="rtl-controls">
                    <button type="button" class="rtl-toggle-btn${soalRtl ? ' active' : ''}" data-target="soal" onclick="toggleRTL(this)">🔤 RTL Soal</button>
                    <button type="button" class="rtl-toggle-btn${jawabanRtl ? ' active' : ''}" data-target="jawaban" onclick="toggleRTL(this)">🔤 RTL Jawaban</button>
                </div>
                <div class="answer-container">
                    <textarea class="text-jawaban${jawabanRtl ? ' rtl-mode' : ''}"
                              oninput="autoResize(this); simpanOtomatis()"
                              placeholder="Tulis jawaban di sini..."
                              inputmode="text">${jawabanClean}</textarea>
                </div>
            `;

            quizSection.appendChild(itemBaru);

            const soalSpan = itemBaru.querySelector('.text-soal');
            if (soalClean === '') {
                soalSpan.dataset.placeholder = 'Tulis pertanyaan...';
            }
        }

        async function tambahSoal() {
            buatElemenSoal({
                id: crypto.randomUUID(),
                soal: '', jawaban: '',
                soal_rtl: false, jawaban_rtl: false
            });
            aturNomor();
            await simpanSubjectSekarang();

            const itemBaru = document.getElementById('quizSection').lastElementChild;
            if (itemBaru) {
                const txtArea = itemBaru.querySelector('.text-jawaban');
                requestAnimationFrame(() => {
                    autoResize(txtArea);
                    window.scrollTo({
                        top: document.body.scrollHeight,
                        behavior: 'smooth'
                    });
                });
            }
        }

        async function hapusSoal(tombol) {
            const item = tombol.parentElement;
            const items = document.querySelectorAll('#quizSection .question-item');
            if (items.length <= 1) {
                return;
            }
            const id = item.dataset.id;
            item.style.transition = 'opacity 0.2s, transform 0.2s';
            item.style.opacity = '0';
            item.style.transform = 'scale(0.95)';

            setTimeout(async () => {
                item.remove();
                aturNomor();
                setStatus('Menghapus...');
                try {
                    if (id) {
                        const { error } = await supabaseClient.from('soal').delete().eq('id', id);
                        if (error) throw error;
                    }
                    await simpanSubjectSekarang();
                } catch (err) {
                    console.error(err);
                    setStatus('⚠️ Gagal menghapus dari Supabase');
                }
            }, 200);
        }

        function aturNomor() {
            const semuaNomor = document.querySelectorAll('#quizSection .num');
            semuaNomor.forEach((span, index) => {
                span.innerText = (index + 1) + '.';
            });
        }

        // ============================================================
        //  TOGGLE RTL PER SOAL / JAWABAN
        // ============================================================
        function toggleRTL(btn) {
            const item = btn.closest('.question-item');
            const target = btn.dataset.target; // 'soal' atau 'jawaban'
            const el = item.querySelector(target === 'soal' ? '.text-soal' : '.text-jawaban');
            if (!el) return;
            const isActive = el.classList.toggle('rtl-mode');
            btn.classList.toggle('active', isActive);
            if (target === 'jawaban') autoResize(el);
            simpanOtomatis();
        }

        // ============================================================
        //  RESIZE TEXTAREA
        // ============================================================
        function autoResize(el) {
            if (!el) return;
            requestAnimationFrame(() => {
                el.style.height = 'auto';
                el.style.height = el.scrollHeight + 'px';
            });
        }

        function sesuaikanSemuaTinggi() {
            document.querySelectorAll('.text-jawaban').forEach(el => autoResize(el));
        }

        // ============================================================
        //  SIMPAN OTOMATIS (debounced)
        // ============================================================
        function simpanOtomatis() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                simpanSubjectSekarang();
            }, 500);
        }

        // ============================================================
        //  EVENT ORIENTASI & RESIZE
        // ============================================================
        window.addEventListener('orientationchange', () => {
            setTimeout(sesuaikanSemuaTinggi, 400);
        });

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(sesuaikanSemuaTinggi, 250);
        });

        // simpan sebelum keluar/menutup tab
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon && clearTimeout(saveTimeout);
        });

        // ============================================================
        //  EXPOSE GLOBAL (untuk inline onclick, karena ini module script)
        // ============================================================
        window.tambahSoal = tambahSoal;
        window.hapusSoal = hapusSoal;
        window.autoResize = autoResize;
        window.simpanOtomatis = simpanOtomatis;
        window.toggleRTL = toggleRTL;
    </script>

</body>
</html>
